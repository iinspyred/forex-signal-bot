name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python sources
        run: |
          python -m py_compile app/main.py app/config.py app/core/logger.py \
            app/services/telegram_service.py app/services/market_service.py \
            app/strategies/strategy_engine.py app/api/routes.py app/utils/retries.py

      - name: Run API tests
        run: |
          pytest --maxfail=1 --disable-warnings -q

      - name: Deploy to Railway
        uses: railwayapp/railway-action@v2
        with:
          railwayToken: ${{ secrets.RAILWAY_API_KEY }}
          projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
          serviceId: ${{ secrets.RAILWAY_SERVICE_ID }}
